# Copy this file to:
#   D:\bitcoin-regtest\bitcoin.conf
#
# Windows pruned regtest config for local harness use.
# Localhost-only RPC.

regtest=1
server=1
prune=550
txindex=0
fallbackfee=0.0002

# RPC (localhost only)
rpcbind=127.0.0.1
rpcallowip=127.0.0.1
rpcport=18443

# Set these before first run.
rpcuser=replace_me_user
rpcpassword=replace_me_password
